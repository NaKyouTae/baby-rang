services:
  # ── 아기랑 NestJS Backend ──
  - type: web
    name: baby-rang-server
    env: docker
    region: singapore
    plan: starter
    branch: main
    autoDeploy: true
    dockerfilePath: ./Dockerfile.render
    # server 폴더 및 Docker/Render 설정 파일 변경시에만 배포
    buildFilter:
      paths:
        - server/**
        - Dockerfile.render
        - render.yaml
        - pnpm-lock.yaml
        - pnpm-workspace.yaml
        - package.json
    envVars:
      # Render 포트 (NestJS main.ts의 process.env.PORT 와 일치)
      - key: PORT
        value: "18080"
      - key: NODE_ENV
        value: production
      # PostgreSQL 연결 (Supabase 등 외부 DB, Dashboard에서 직접 입력)
      - key: DATABASE_URL
        sync: false
      # JWT
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      # Client (웹앱 URL)
      - key: CLIENT_URL
        value: https://baby-rang.spectrify.kr
      # Kakao OAuth
      - key: KAKAO_CLIENT_ID
        sync: false
      - key: KAKAO_CLIENT_SECRET
        sync: false
      - key: KAKAO_CALLBACK_URL
        sync: false
      # Supabase S3 (이미지 업로드용)
      - key: SUPABASE_ACCESS_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_S3_ENDPOINT
        value: https://lcsaxyxgfojwosdicddy.supabase.co/storage/v1/s3
      - key: SUPABASE_S3_BUCKET
        value: baby-rang
      - key: SUPABASE_PUBLIC_URL
        value: https://lcsaxyxgfojwosdicddy.supabase.co/storage/v1/object/public
      # Admin
      - key: ADMIN_TOKEN
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # Toss Payments
      - key: TOSS_SECRET_KEY
        sync: false
