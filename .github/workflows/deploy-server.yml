name: Deploy server to cloudtype
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'server/**'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Connect
        uses: cloudtype-github-actions/connect@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          ghtoken: ${{ secrets.GHP_TOKEN }}
          scope: ${{ secrets.CLOUDTYPE_SCOPE }}
      - name: Deploy
        uses: cloudtype-github-actions/deploy@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          project: ${{ secrets.CLOUDTYPE_SCOPE }}/${{ secrets.CLOUDTYPE_PROJECT }}
          stage: main
          message: ${{ github.event.head_commit.message || github.sha }}
          yaml: |-
            name: baby-rang-1
            app: dockerfile
            options:
              dockerfile: Dockerfile.render
              rootdir: /server
              ports: 18080
            env:
              PORT: "18080"
              DATABASE_URL: "${{ secrets.DATABASE_URL }}"
              JWT_SECRET: "${{ secrets.JWT_SECRET }}"
              JWT_EXPIRES_IN: "7d"
              KAKAO_CLIENT_ID: "${{ secrets.KAKAO_CLIENT_ID }}"
              KAKAO_CLIENT_SECRET: "${{ secrets.KAKAO_CLIENT_SECRET }}"
              KAKAO_ADMIN_KEY: "${{ secrets.KAKAO_ADMIN_KEY }}"
              KAKAO_CALLBACK_URL: "${{ secrets.KAKAO_CALLBACK_URL }}"
              CLIENT_URL: "${{ secrets.CLIENT_URL }}"
              SUPABASE_ACCESS_KEY: "${{ secrets.SUPABASE_ACCESS_KEY }}"
              SUPABASE_SECRET_KEY: "${{ secrets.SUPABASE_SECRET_KEY }}"
              SUPABASE_S3_ENDPOINT: "${{ secrets.SUPABASE_S3_ENDPOINT }}"
              SUPABASE_S3_BUCKET: "baby-rang"
              SUPABASE_PUBLIC_URL: "${{ secrets.SUPABASE_PUBLIC_URL }}"
              ADMIN_TOKEN: "${{ secrets.ADMIN_TOKEN }}"
              ADMIN_USERNAME: "${{ secrets.ADMIN_USERNAME }}"
              ADMIN_PASSWORD: "${{ secrets.ADMIN_PASSWORD }}"
              DATA_GO_KR_API_KEY: "${{ secrets.DATA_GO_KR_API_KEY }}"
              TOSS_SECRET_KEY: "${{ secrets.TOSS_SECRET_KEY }}"
            context:
              git:
                ref: ${{ github.ref }}
                url: git@github.com:${{ github.repository }}.git
