name: Deploy server to cloudtype
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'server/**'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Connect
        uses: cloudtype-github-actions/connect@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          ghtoken: ${{ secrets.GHP_TOKEN }}
          scope: ${{ secrets.CLOUDTYPE_SCOPE }}
      - name: Deploy
        uses: cloudtype-github-actions/deploy@v1
        with:
          token: ${{ secrets.CLOUDTYPE_TOKEN }}
          project: ${{ secrets.CLOUDTYPE_SCOPE }}/${{ secrets.CLOUDTYPE_PROJECT }}
          stage: main
          message: ${{ github.event.head_commit.message || github.sha }}
          yaml: |-
            name: baby-rang-1
            app: dockerfile
            options:
              dockerfile: Dockerfile.render
              rootdir: /server
              ports: 18080
            env:
              - name: PORT
                value: "18080"
              - name: DATABASE_URL
                value: "${{ secrets.DATABASE_URL }}"
              - name: JWT_SECRET
                value: "${{ secrets.JWT_SECRET }}"
              - name: JWT_EXPIRES_IN
                value: "7d"
              - name: KAKAO_CLIENT_ID
                value: "${{ secrets.KAKAO_CLIENT_ID }}"
              - name: KAKAO_CLIENT_SECRET
                value: "${{ secrets.KAKAO_CLIENT_SECRET }}"
              - name: KAKAO_ADMIN_KEY
                value: "${{ secrets.KAKAO_ADMIN_KEY }}"
              - name: KAKAO_CALLBACK_URL
                value: "${{ secrets.KAKAO_CALLBACK_URL }}"
              - name: CLIENT_URL
                value: "${{ secrets.CLIENT_URL }}"
              - name: SUPABASE_ACCESS_KEY
                value: "${{ secrets.SUPABASE_ACCESS_KEY }}"
              - name: SUPABASE_SECRET_KEY
                value: "${{ secrets.SUPABASE_SECRET_KEY }}"
              - name: SUPABASE_S3_ENDPOINT
                value: "${{ secrets.SUPABASE_S3_ENDPOINT }}"
              - name: SUPABASE_S3_BUCKET
                value: "baby-rang"
              - name: SUPABASE_PUBLIC_URL
                value: "${{ secrets.SUPABASE_PUBLIC_URL }}"
              - name: ADMIN_TOKEN
                value: "${{ secrets.ADMIN_TOKEN }}"
              - name: ADMIN_USERNAME
                value: "${{ secrets.ADMIN_USERNAME }}"
              - name: ADMIN_PASSWORD
                value: "${{ secrets.ADMIN_PASSWORD }}"
              - name: DATA_GO_KR_API_KEY
                value: "${{ secrets.DATA_GO_KR_API_KEY }}"
              - name: TOSS_SECRET_KEY
                value: "${{ secrets.TOSS_SECRET_KEY }}"
            context:
              git:
                ref: ${{ github.ref }}
                url: git@github.com:${{ github.repository }}.git
